  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sed}\ninput,select,button{font-family:inherit}\n::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-track{background:transparent}\n::-webkit-scrollbar-thumb{background:#dfe3ea;border-radius:8px;border:2px solid #f6f7f9}\n@keyframes mmIn{from{transform:translateY(8px)}to{transform:none}}\n@keyframes mmSlide{from{transform:translateX(40px);opacity:.4}to{transform:none;opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Manrope',system-ui,sans-serif;color:#1b2230;background:#f6f7f9;overflow:hidden\">\n\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;min-height:0\">\n      <div style=\"width:44%;min-width:380px;background:#1b2230;color:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:52px 56px;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;right:-90px;top:-40px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle at 30% 30%, rgba(31,86,214,0.30), rgba(31,86,214,0) 70%)\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;position:relative\">\n          <img src=\"086c3b3d-7925-4fbe-a8ab-40c0165e6b26\" alt=\"Milenium\" style=\"width:52px;height:auto;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))\">\n          <div style=\"line-height:1.05\">\n            <div style=\"font-size:20px;font-weight:800;letter-spacing:.01em\">MILENIUM<\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:.34em\">MOTOS<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:rgba(255,255,255,.45);margin-bottom:16px\">INVENTARIO DE REPUESTOS<\u002Fdiv>\n          <div style=\"font-size:34px;font-weight:800;line-height:1.12;max-width:400px\">Cada repuesto, clasificado y bajo control.<\u002Fdiv>\n          <div style=\"font-size:15px;color:rgba(255,255,255,.62);margin-top:16px;max-width:370px;line-height:1.5\">Control de stock por grupo y SKU, alertas automáticas de reposición, trazabilidad de movimientos y reportes para tus compras.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;display:flex;gap:28px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,.5)\">\n          <span>{{ nGroups }} grupos<\u002Fspan><span>{{ nSkus }} SKUs<\u002Fspan><span>{{ nUnits }} unidades<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:40px;background:#f6f7f9\">\n        <div style=\"width:380px;max-width:100%;animation:mmIn .5s ease both\">\n          <div style=\"font-size:26px;font-weight:800;letter-spacing:-.01em\">Iniciar sesión<\u002Fdiv>\n          <div style=\"font-size:14px;color:#5b6472;margin-top:6px\">Ingresa con tu cuenta del sistema<\u002Fdiv>\n          <div style=\"margin-top:28px\">\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#1b2230;margin-bottom:7px\">Usuario<\u002Flabel>\n            <input value=\"{{ user }}\" oninput=\"{{ onUser }}\" placeholder=\"admin@mileniummotos.pe\" style=\"width:100%;padding:13px 14px;border:1px solid #e3e6ec;border-radius:11px;font-size:14.5px;background:#fff;outline:none;color:#1b2230\" style-focus=\"border:1px solid #1F56D6;box-shadow:0 0 0 3px rgba(31,86,214,.12)\">\n          <\u002Fdiv>\n          <div style=\"margin-top:16px\">\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#1b2230;margin-bottom:7px\">Contraseña<\u002Flabel>\n            <input type=\"password\" value=\"{{ pass }}\" oninput=\"{{ onPass }}\" placeholder=\"••••••••\" style=\"width:100%;padding:13px 14px;border:1px solid #e3e6ec;border-radius:11px;font-size:14.5px;background:#fff;outline:none;color:#1b2230\" style-focus=\"border:1px solid #1F56D6;box-shadow:0 0 0 3px rgba(31,86,214,.12)\">\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:16px;font-size:13px\">\n            <label style=\"display:flex;align-items:center;gap:8px;color:#5b6472;cursor:pointer\"><input type=\"checkbox\" checked=\"checked\" style=\"width:15px;height:15px;accent-color:#1F56D6\">Recordarme<\u002Flabel>\n            <span style=\"color:#1F56D6;font-weight:600;cursor:pointer\">¿Olvidaste tu contraseña?<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ login }}\" style=\"width:100%;margin-top:24px;padding:14px;background:#1F56D6;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px rgba(31,86,214,.28)\" style-hover=\"background:#1846B3\">Ingresar al sistema<\u002Fbutton>\n          <div style=\"margin-top:18px;font-size:12.5px;color:#8a93a3;text-align:center\">Demo · cualquier credencial te deja entrar<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showApp }}\">\n    <div style=\"flex:1;display:flex;min-height:0\">\n      <aside style=\"{{ sideStyle }}\">\n        <div style=\"padding:22px 20px 18px;display:flex;align-items:center;gap:12px\">\n          <img src=\"086c3b3d-7925-4fbe-a8ab-40c0165e6b26\" alt=\"Milenium\" style=\"width:34px;height:auto\">\n          <div style=\"line-height:1.05\">\n            <div style=\"font-size:15px;font-weight:800;letter-spacing:.01em;color:{{ brandText }}\">MILENIUM <span style=\"font-weight:500;color:{{ brandSub }}\">MOTOS<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.22em;color:{{ brandSub }};margin-top:2px\">REPUESTOS<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <nav style=\"padding:8px 12px;display:flex;flex-direction:column;gap:3px;flex:1\">\n          <button , rot:40 },\n      { sku:'KIT-FZ', desc:'Kit arrastre FZ25', compat:'FZ25', stock:2, min:3, rot:58 },\n    ]},\n  ];\n\n  MOVS = [\n    { tipo:'Ingreso', qty:24, item:'Llanta 90/90-17', code:'OC-3312', from:'Proveedor Michelin', to:'Almacén', user:'Admin', fecha:'Hoy · 09:14' },\n    { tipo:'Salida', qty:-2, item:'Pastilla delantera FZ25', code:'VTA-8841', from:'Almacén', to:'Mostrador · Venta', user:'L. Díaz', fecha:'Hoy · 08:40' },\n    { tipo:'Ajuste', qty:-1, item:'Foco LED H4 6000K', code:'AJ-204', from:'Almacén', to:'Merma / dañado', user:'Admin', fecha:'Ayer · 17:22' },\n    { tipo:'Ingreso', qty:20, item:'Bujía NGK CR7HSA', code:'OC-3308', from:'Proveedor NGK', to:'Almacén', user:'Admin', fecha:'Ayer · 15:10' },\n    { tipo:'Salida', qty:-4, item:'Kit arrastre CB190', code:'TAL-119', from:'Almacén', to:'Taller · Servicio', user:'M. Soto', fecha:'Ayer · 11:05' },\n    { tipo:'Salida', qty:-3, item:'Filtro de aceite Honda', code:'VTA-8836', from:'Almacén', to:'Mostrador · Venta', user:'L. Díaz', fecha:'28 jun · 16:30' },\n    { tipo:'Ingreso', qty:8, item:'Parabrisas 15\" ahumado', code:'OC-3301', from:'Proveedor Genérico', to:'Almacén', user:'Admin', fecha:'28 jun · 12:08' },\n    { tipo:'Salida', qty:-5, item:'Cadena 520 · 112L', code:'VTA-8829', from:'Almacén', to:'Mostrador · Venta', user:'M. Soto', fecha:'27 jun · 10:45' },\n  ];\n\n  allSkus(){ const out=[]; this.GROUPS.forEach(g=>g.skus.forEach(s=>out.push({...s,groupId:g.id,groupName:g.name}))); return out; }\n  statusOf(s){ if(s.stock===0) return 'Agotado'; if(s.stock<s.min) return 'Stock bajo'; if(s.stock>=s.min*4) return 'Exceso'; return 'Disponible'; }\n\n  badgeStock(label){\n    const base={display:'inline-flex',alignItems:'center',gap:'6px',padding:'3px 9px',borderRadius:'999px',fontSize:'12px',fontWeight:600,lineHeight:1.4,whiteSpace:'nowrap'};\n    const M={'Disponible':['#e7f6ee','#1b7a47','#1f9d57'],'Stock bajo':['#fdeede','#b3640f','#e8870f'],'Agotado':['#fde8e8','#c0322f','#E23B3B'],'Exceso':['#e8eefc','#1846B3','#1F56D6']};\n    const c=M[label]||['#eef1f5','#5b6472','#8a93a3'];\n    return { label, style:{...base,background:c[0],color:c[1]}, dot:{width:'6px',height:'6px',borderRadius:'50%',flex:'none',background:c[2]} };\n  }\n\n  genHistory(s){\n    const users=['Admin','J. Ramos','L. Díaz','M. Soto'];\n    const seq=[['Ingreso',1,'Proveedor → Almacén'],['Salida',-1,'Almacén → Mostrador'],['Salida',-1,'Almacén → Taller'],['Ajuste',-1,'Almacén → Merma'],['Ingreso',1,'Proveedor → Almacén'],['Salida',-1,'Almacén → Mostrador']];\n    const dates=['Hoy · 10:12','Ayer · 16:40','24 jun · 09:30','20 jun · 14:05','15 jun · 11:20'];\n    const typeMap={'Ingreso':['#e7f6ee','#1b7a47'],'Salida':['#fbf3d6','#8a6a12'],'Ajuste':['#fde8e8','#c0322f']};\n    const seed=s.sku.length+s.stock+s.min;\n    const out=[];\n    for(let i=0;i<5;i++){ const t=seq[(seed+i)%seq.length]; const q=t[1]*(1+((seed*(i+1))%6)); const pos=q>=0;\n      const c=typeMap[t[0]];\n      out.push({ tipo:t[0], flow:t[2], code:(t[0]==='Ingreso'?'OC-':t[0]==='Salida'?'VTA-':'AJ-')+(3000+((seed*31+i*7)%900)),\n        fecha:dates[i], user:users[(seed+i)%users.length],\n        qtyLabel:(pos?'+':'−')+Math.abs(q), qtyColor:pos?'#1b7a47':'#c0322f',\n        typeBadge:{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:'999px',fontSize:'11.5px',fontWeight:700,background:c[0],color:c[1]} });\n    }\n    return out;\n  }\n\n  renderVals(){\n    const st=this.state;\n    const view = st.view || this.props.defaultView || 'dashboard';\n    const dark = (this.props.sidebarTheme||'Oscuro') !== 'Claro';\n    const primary = '#1F56D6';\n    const emph = this.props.lowStockEmphasis !== false;\n    const skus=this.allSkus();\n    const totalAll=skus.reduce((s,x)=>s+x.stock,0);\n\n    // nav\n    const navBase={display:'flex',alignItems:'center',gap:'12px',width:'100%',padding:'11px 14px',border:'none',borderRadius:'10px',fontFamily:'inherit',fontSize:'14px',fontWeight:600,cursor:'pointer',textAlign:'left'};\n    const navStyle=key=>{\n      if(view===key) return {...navBase,background: dark?'rgba(31,86,214,0.24)':'#eef3ff', color: dark?'#fff':primary, boxShadow:'inset 3px 0 0 '+primary};\n      return {...navBase,background:'transparent', color: dark?'rgba(255,255,255,0.64)':'#5b6472'};\n    };\n    const nav={dashboard:navStyle('dashboard'),inventario:navStyle('inventario'),alertas:navStyle('alertas'),movimientos:navStyle('movimientos'),reportes:navStyle('reportes')};\n    const onNav={dashboard:()=>this.setState({view:'dashboard'}),inventario:()=>this.setState({view:'inventario'}),alertas:()=>this.setState({view:'alertas'}),movimientos:()=>this.setState({view:'movimientos'}),reportes:()=>this.setState({view:'reportes'})};\n\n    // alerts\n    const sevMap={'Crítica':['#fde8e8','#c0322f','#E23B3B'],'Alta':['#fdeede','#b3640f','#e8870f'],'Media':['#e8eefc','#1846B3','#1F56D6']};\n    const sevBadge=s=>({display:'inline-flex',alignItems:'center',padding:'2px 9px',borderRadius:'999px',fontSize:'11px',fontWeight:700,marginTop:'5px',background:sevMap[s][0],color:sevMap[s][1]});\n    const sevDot=s=>({width:'9px',height:'9px',borderRadius:'50%',flex:'none',background:sevMap[s][2]});\n    const btnStyle=s=>({padding:'8px 13px',borderRadius:'9px',fontSize:'12.5px',fontWeight:700,cursor:'pointer',border:'none',flex:'none',background:sevMap[s][0],color:sevMap[s][1]});\n    const alerts=[];\n    skus.forEach(s=>{\n      if(s.stock===0) alerts.push({sev:'Crítica',tipo:'Agotado',sku:s.desc,groupName:s.groupName,detail:'0 unidades en stock',accion:'reponer '+(s.min*2)+' u.',btn:'Generar OC'});\n      else if(s.stock<s.min) alerts.push({sev:'Alta',tipo:'Stock bajo',sku:s.desc,groupName:s.groupName,detail:s.stock+' u. · mínimo '+s.min+' u.',accion:'reponer '+(s.min*2-s.stock)+' u.',btn:'Generar OC'});\n      if(s.stock>0&&s.rot>=60) alerts.push({sev:'Media',tipo:'Baja rotación',sku:s.desc,groupName:s.groupName,detail:s.rot+' días promedio en stock',accion:'promoción / descuento',btn:'Revisar'});\n      if(s.stock>=s.min*4) alerts.push({sev:'Media',tipo:'Exceso de stock',sku:s.desc,groupName:s.groupName,detail:s.stock+' u. · '+(s.stock/s.min).toFixed(1)+'× el mínimo',accion:'pausar compra',btn:'Revisar'});\n    });\n    const ord={'Crítica':0,'Alta':1,'Media':2};\n    alerts.sort((a,b)=>ord[a.sev]-ord[b.sev]);\n    alerts.forEach(a=>{a.sevBadge=sevBadge(a.sev);a.sevDot=sevDot(a.sev);a.btnStyle=btnStyle(a.sev);});\n    const critCount=alerts.filter(a=>a.sev==='Crítica').length;\n    const altaCount=alerts.filter(a=>a.sev==='Alta').length;\n    const mediaCount=alerts.filter(a=>a.sev==='Media').length;\n\n    // group bars\n    const groupColors=['#1F56D6','#1846B3','#3a68cf','#5b78c4','#7089c9','#8a9bd0','#2f6bd6','#4a74cc','#6382c6','#93a3d4'];\n    const gStats=this.GROUPS.map(g=>({id:g.id,name:g.name,count:g.skus.reduce((s,x)=>s+x.stock,0),skus:g.skus.length}));\n    const maxG=Math.max(...gStats.map(g=>g.count));\n    const groupBars=gStats.map((g,i)=>({name:g.name,count:g.count,skus:g.skus,pct:Math.round(g.count/totalAll*100),barStyle:{height:'100%',width:(g.count/maxG*100)+'%',background:groupColors[i%groupColors.length],borderRadius:'6px'}}));\n\n    // slow movers\n    const rotColor=r=> r>=60?'#E23B3B':r>=40?'#e8870f':'#1F56D6';\n    const slowSrc=skus.filter(s=>s.stock>0&&s.rot>0).slice().sort((a,b)=>b.rot-a.rot);\n    const maxRot=Math.max(...slowSrc.map(s=>s.rot));\n    const mapSlow=s=>({sku:s.desc,rotLabel:s.rot+' d',color:rotColor(s.rot),barStyle:{height:'100%',width:(s.rot/maxRot*100)+'%',background:rotColor(s.rot),borderRadius:'6px'}});\n    const slowAll=slowSrc.map(mapSlow);\n    const slowTop=slowSrc.slice(0,5).map(mapSlow);\n\n    // movements\n    const typeMap={'Ingreso':['#e7f6ee','#1b7a47','#1f9d57'],'Salida':['#fbf3d6','#8a6a12','#d4a813'],'Ajuste':['#fde8e8','#c0322f','#E23B3B']};\n    const mapMov=m=>{ const c=typeMap[m.tipo]; const pos=m.qty>=0;\n      return {...m, typeBadge:{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:'999px',fontSize:'11.5px',fontWeight:700,background:c[0],color:c[1]},\n        dotStyle:{width:'11px',height:'11px',borderRadius:'50%',flex:'none',background:c[2],boxShadow:'0 0 0 3px '+c[0]},\n        qtyLabel:(pos?'+':'−')+Math.abs(m.qty)+' u.', qtyStyle:{color:pos?'#1b7a47':'#c0322f'}}; };\n    const movItems=this.MOVS.map(mapMov);\n    const movTop=movItems.slice(0,5);\n    const movFiltered = st.movFilter==='Todos' ? movItems : movItems.filter(m=>m.tipo===st.movFilter);\n    const chipBase={padding:'8px 15px',borderRadius:'999px',fontSize:'13px',fontWeight:600,cursor:'pointer'};\n    const movChips=['Todos','Ingreso','Salida','Ajuste'].map(label=>({label,\n      style: st.movFilter===label ? {...chipBase,background:primary,color:'#fff',border:'1px solid '+primary} : {...chipBase,background:'#fff',color:'#5b6472',border:'1px solid #e3e6ec'},\n      onClick:()=>this.setState({movFilter:label}) }));\n\n    // inventory\n    const q=st.query.trim().toLowerCase();\n    const filtered=skus.filter(s=> (st.group==='all'||s.groupId===st.group) && (!q || (s.desc+' '+s.sku+' '+s.groupName+' '+s.compat).toLowerCase().includes(q)));\n    const invRows=filtered.map(s=>{ const status=this.statusOf(s); const b=this.badgeStock(status); const bad=status==='Agotado'||status==='Stock bajo';\n      return { desc:s.desc, sku:s.sku, groupName:s.groupName, stock:s.stock, min:s.min,\n        statusLabel:b.label, statusStyle:b.style, statusDot:b.dot,\n        rotLabel:s.rot>0?(s.rot+' d'):'—', rotColor:s.rot>=60?'#E23B3B':s.rot>=40?'#e8870f':s.rot>0?'#5b6472':'#c4c9d2',\n        rowStyle:{cursor:'pointer',background:(emph&&bad)?'#fff8f8':'#fff'},\n        open:()=>this.setState({sel:s}) }; });\n    const groupNameById=id=>{ const g=this.GROUPS.find(x=>x.id===id); return g?g.name:''; };\n\n    // group chips\n    const gcBase={padding:'8px 15px',borderRadius:'999px',fontSize:'13px',fontWeight:600,cursor:'pointer'};\n    const groupChips=[{id:'all',label:'Todos'}].concat(this.GROUPS.map(g=>({id:g.id,label:g.name}))).map(g=>({label:g.label,\n      style: st.group===g.id ? {...gcBase,background:primary,color:'#fff',border:'1px solid '+primary} : {...gcBase,background:'#fff',color:'#5b6472',border:'1px solid #e3e6ec'},\n      onClick:()=>this.setState({group:g.id}) }));\n\n    // compras\n    const comprasRows=skus.filter(s=>['Agotado','Stock bajo'].includes(this.statusOf(s))).map(s=>{ const prio=s.stock===0?'Crítica':'Alta';\n      return {desc:s.desc,sku:s.sku,groupName:s.groupName,actual:s.stock,min:s.min,sugerido:Math.max(s.min*2-s.stock,s.min),prio,actualColor:s.stock===0?'#c0322f':'#b3640f',prioStyle:sevBadge(prio)}; });\n    comprasRows.sort((a,b)=>ord[a.prio]-ord[b.prio]);\n    const unitsRep=comprasRows.reduce((s,r)=>s+r.sugerido,0);\n    const totalMin=skus.reduce((s,x)=>s+x.min,0);\n    const repKpis=[\n      {label:'Unidades a reponer',value:String(unitsRep),sub:comprasRows.length+' SKUs bajo mínimo'},\n      {label:'SKUs en exceso',value:String(skus.filter(s=>this.statusOf(s)==='Exceso').length),sub:'candidatos a pausar compra'},\n      {label:'Rotación lenta',value:String(skus.filter(s=>s.rot>=60).length),sub:'SKUs ≥ 60 días en stock'},\n      {label:'Cobertura',value:(Math.round(totalAll/totalMin*10)/10)+'×',sub:'stock total vs mínimos'},\n    ];\n\n    // kpis\n    const kpiDot=c=>({width:'8px',height:'8px',borderRadius:'50%',background:c,flex:'none'});\n    const rotArr=skus.filter(s=>s.stock>0&&s.rot>0);\n    const avgRot=Math.round(rotArr.reduce((s,x)=>s+x.rot,0)/rotArr.length);\n    const inStock=skus.filter(s=>s.stock>0).length;\n    const kpis=[\n      {label:'Unidades en stock',value:String(totalAll),sub:skus.length+' SKUs · '+inStock+' con stock',dot:kpiDot('#1F56D6')},\n      {label:'Grupos',value:String(this.GROUPS.length),sub:skus.length+' SKUs clasificados',dot:kpiDot('#1b7a47')},\n      {label:'Alertas activas',value:String(alerts.length),sub:critCount+' críticas · '+altaCount+' altas',dot:kpiDot('#E23B3B')},\n      {label:'Rotación promedio',value:avgRot+' d',sub:'meta ≤ 30 días',dot:kpiDot('#e8870f')},\n      {label:'Movimientos (7d)',value:String(this.MOVS.length),sub:'ingresos, salidas y ajustes',dot:kpiDot('#5b6472')},\n    ];\n\n    const titles={dashboard:['Panel general','Resumen de stock, alertas y movimientos de repuestos'],inventario:['Inventario','Repuestos clasificados por grupo y SKU'],alertas:['Alertas automáticas','Reposición, rotación y exceso de stock'],movimientos:['Trazabilidad de movimientos','Ingresos, salidas y ajustes'],reportes:['Reportes','Decisiones de compra y rotación']};\n\n    const sel=st.sel;\n    const selStatus=sel?this.badgeStock(this.statusOf(sel)):null;\n\n    return {\n      showLogin:!st.loggedIn, showApp:st.loggedIn,\n      nGroups:this.GROUPS.length, nSkus:skus.length, nUnits:totalAll,\n      user:st.user, pass:st.pass, query:st.query, group:st.group, notifCount:alerts.length,\n      onUser:e=>this.setState({user:e.target.value}), onPass:e=>this.setState({pass:e.target.value}),\n      onQuery:e=>this.setState({query:e.target.value}), onGroup:e=>this.setState({group:e.target.value}),\n      login:()=>this.setState({loggedIn:true}), logout:()=>this.setState({loggedIn:false,view:null}),\n      nav, onNav, groupOpts:this.GROUPS.map(g=>({id:g.id,name:g.name})),\n      sideStyle:{width:'248px',flex:'none',display:'flex',flexDirection:'column',background: dark?'#1b2230':'#ffffff', borderRight: dark?'none':'1px solid #eef1f5'},\n      sideFootStyle:{padding:'14px 16px',borderTop: dark?'1px solid rgba(255,255,255,0.08)':'1px solid #eef1f5'},\n      brandText: dark?'#fff':'#1b2230', brandSub: dark?'rgba(255,255,255,0.5)':'#8a93a3',\n      navBadge:{minWidth:'20px',height:'18px',padding:'0 5px',borderRadius:'9px',background:'#E23B3B',color:'#fff',fontSize:'10.5px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'},\n      viewTitle:titles[view][0], viewSub:titles[view][1],\n      vDash:view==='dashboard', vInv:view==='inventario', vAlert:view==='alertas', vMov:view==='movimientos', vRep:view==='reportes',\n      kpis, alertsTop:alerts.slice(0,5), movTop, slowTop, groupBars,\n      alerts, critCount, altaCount, mediaCount,\n      groupChips, invRows, invEmpty:invRows.length===0, invCount:filtered.length, invUnits:filtered.reduce((s,x)=>s+x.stock,0), groupLabel: st.group==='all'?'':('· '+groupNameById(st.group)),\n      movChips, movFiltered,\n      repKpis, comprasRows, slowAll,\n      drawerOpen:!!sel,\n      drawerGroup:sel?sel.groupName:'', drawerSku:sel?sel.sku:'', drawerDesc:sel?sel.desc:'', drawerStock:sel?sel.stock:0, drawerMin:sel?sel.min:0,\n      drawerRot:sel?(sel.rot>0?sel.rot+' d':'—'):'', drawerRotColor:sel?(sel.rot>=60?'#E23B3B':sel.rot>=40?'#e8870f':'#1b2230'):'#1b2230', drawerCompat:sel?sel.compat:'',\n      drawerStatusLabel:selStatus?selStatus.label:'', drawerStatusStyle:selStatus?selStatus.style:{}, drawerStatusDot:selStatus?selStatus.dot:{},\n      drawerHistory:sel?this.genHistory(sel):[],\n      closeDrawer:()=>this.setState({sel:null})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
