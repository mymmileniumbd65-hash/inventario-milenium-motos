  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"76c64c89-c19a-4947-9625-8649bfcde8db\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:max-content; min-width:100%; min-height:100vh; box-sizing:border-box; padding:48px; background:#e7e5df; font-family:Saira,sans-serif;\">\n\n  <!-- ===================== INTRO ===================== -->\n  <div style=\"max-width:980px; margin-bottom:44px;\">\n    <div style=\"font-family:'Saira Condensed',sans-serif; font-weight:700; letter-spacing:3px; font-size:13px; color:#0a3ca8; text-transform:uppercase;\">Rediseño de identidad<\u002Fdiv>\n    <h1 style=\"font-family:Anton,sans-serif; font-size:46px; line-height:1.02; margin:8px 0 14px; color:#11151c; letter-spacing:0.5px;\">MILENIUM MOTOS<\u002Fh1>\n    <p style=\"font-size:17px; line-height:1.6; color:#3a4150; margin:0 0 18px; max-width:760px;\">Exploraciones del logotipo. El nombre del negocio — <strong>MILENIUM<\u002Fstrong> — toma el protagonismo, con <strong>TVS KING<\u002Fstrong> como respaldo de marca. Tomé el ADN del distribuidor: azul TVS, cromado metálico, corona dorada y acentos en rojo. Cada concepto está pensado para fachada, redes, documentos y uniformes.<\u002Fp>\n    <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n      <span style=\"display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid #d8d5cc; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; color:#1c2330;\"><span style=\"width:13px;height:13px;border-radius:3px;background:#0a3ca8;\"><\u002Fspan>Azul TVS #0A3CA8<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid #d8d5cc; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; color:#1c2330;\"><span style=\"width:13px;height:13px;border-radius:3px;background:linear-gradient(135deg,#fff,#9aa4b6);\"><\u002Fspan>Cromado<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid #d8d5cc; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; color:#1c2330;\"><span style=\"width:13px;height:13px;border-radius:3px;background:linear-gradient(135deg,#ffe487,#f0a800);\"><\u002Fspan>Dorado corona<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid #d8d5cc; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; color:#1c2330;\"><span style=\"width:13px;height:13px;border-radius:3px;background:#e2231a;\"><\u002Fspan>Rojo #E2231A<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== SECCIÓN A ===================== -->\n  <div style=\"font-family:'Saira Condensed',sans-serif; font-weight:800; letter-spacing:2px; font-size:14px; color:#6b7180; text-transform:uppercase; margin-bottom:16px;\">Conceptos principales<\u002Fdiv>\n  <div style=\"display:flex; gap:48px; align-items:flex-start; margin-bottom:56px;\">\n\n    <!-- Concept 01 -->\n    <div style=\"flex:none; width:540px;\">\n      <div style=\"font-family:'Saira Condensed',sans-serif; font-weight:700; font-size:14px; color:#3a4150; margin-bottom:10px;\">01 · King Metálico <span style=\"color:#9aa1ae; font-weight:500;\">— cromado + corona<\u002Fspan><\u002Fdiv>\n      <div style=\"background:#fff; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.08); padding:30px;\">\n        <div style=\"border-radius:10px; padding:42px 30px 38px; background:radial-gradient(120% 120% at 50% 0%,#1a57d8 0%,#0a3ca8 42%,#062a6e 100%); position:relative; overflow:hidden;\">\n          <div style=\"position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);\"><\u002Fdiv>\n          <!-- ribbon -->\n          <div style=\"display:flex; justify-content:center; margin-bottom:14px;\">\n            <span style=\"background:linear-gradient(180deg,#f6463c,#c5120a); color:#fff; font-family:'Saira Condensed',sans-serif; font-weight:800; letter-spacing:2px; font-size:11px; padding:5px 16px; border-radius:3px; box-shadow:0 2px 5px rgba(0,0,0,.35); text-transform:uppercase;\">Distribuidor oficial<\u002Fspan>\n          <\u002Fdiv>\n          <!-- backing TVS KING -->\n          <div style=\"display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2px;\">\n            <span style=\"font-family:'Saira Condensed',sans-serif; font-style:italic; font-weight:900; font-size:22px; letter-spacing:1px; background:linear-gradient(180deg,#ffffff,#cfd6e2 55%,#7e8a9e); -webkit-background-clip:text; background-clip:text; color:transparent;\">TVS<\u002Fspan>\n            <span style=\"font-family:'Saira Condensed',sans-serif; font-style:italic; font-weight:900; font-size:22px; letter-spacing:1px; background:linear-gradient(180deg,#fff6cf,#ffe487 45%,#f0a800 75%,#b06f00); -webkit-background-clip:text; background-clip:text; color:transparent;\">KING<\u002Fspan>\n            <img src=\"bb39889a-7f3e-4436-9b96-3ac354c6b65a\" alt=\"\" width=\"34\" style=\"height:auto; display:block; margin-bottom:7px;\">\n          <\u002Fdiv>\n          <!-- hero MILENIUM -->\n          <div style=\"text-align:center; line-height:0.9;\">\n            <span style=\"display:inline-block; transform:skewX(-8deg); font-family:Anton,sans-serif; font-size:74px; letter-spacing:0px; background:linear-gradient(180deg,#ffffff 0%,#e4e9f1 16%,#a7b0c0 40%,#5d6678 50%,#9aa4b6 60%,#eef2f8 84%,#c2cad8
